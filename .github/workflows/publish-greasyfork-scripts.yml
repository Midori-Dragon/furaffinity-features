name: GreasyFork Release

on:
  workflow_run:
    workflows: ["Build Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish (e.g. v1.2.3)'
        required: true

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Get release tag
        id: tag
        run: |
          if [ -n "${{ inputs.release_tag }}" ]; then
            echo "tag=${{ inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(git describe --tags --exact-match HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all modules
        run: npm run build:Browser-Extension-Rebuild

      - name: Collect and rename bundles for GreasyFork
        run: node build-scripts/collect-greasyfork-bundles.cjs

      - name: Publish bundles to greasyfork-releases branch
        uses: s0/git-publish-subdir-action@v2.6.0
        env:
          REPO: self
          BRANCH: greasyfork-releases
          FOLDER: greasyfork-dist
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_EMPTY_COMMITS: true
          MESSAGE: "Release ${{ steps.tag.outputs.tag }}"
          CLEAR_GLOBS_FILE: "greasyfork-dist/.clear-target-files"
