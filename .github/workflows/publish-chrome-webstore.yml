name: Publish to Chrome Web Store

on:
  workflow_run:
    workflows: ["Build Release"]
    types: [completed]

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download extension zip from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName --jq '.[0].tagName')
          gh release download "$TAG" \
            --repo ${{ github.repository }} \
            --pattern 'furaffinity-features-extension.zip' \
            --dir dist/

      - name: Verify zip exists
        run: |
          if [ -f dist/furaffinity-features-extension.zip ]; then
            echo "✓ dist/furaffinity-features-extension.zip exists ($(du -h dist/furaffinity-features-extension.zip | cut -f1))"
          else
            echo "✗ dist/furaffinity-features-extension.zip NOT FOUND" && exit 1
          fi

      - name: Publish to Chrome Web Store
        env:
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
        run: |
          ACCESS_TOKEN=$(curl -s -X POST \
            -d "client_id=${CHROME_CLIENT_ID}&client_secret=${CHROME_CLIENT_SECRET}&refresh_token=${CHROME_REFRESH_TOKEN}&grant_type=refresh_token" \
            "https://oauth2.googleapis.com/token" | jq -r .access_token)
          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "Failed to obtain access token" && exit 1
          fi

          UPLOAD_RESPONSE=$(curl -s -X PUT \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "x-goog-api-version: 2" \
            -T dist/furaffinity-features-extension.zip \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${CHROME_EXTENSION_ID}")
          echo "Upload response: $UPLOAD_RESPONSE"
          echo "$UPLOAD_RESPONSE" | jq -e '.uploadState == "SUCCESS" or .uploadState == "IN_PROGRESS"' \
            || { echo "Upload failed"; exit 1; }

          PUBLISH_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${CHROME_EXTENSION_ID}/publish")
          echo "Publish response: $PUBLISH_RESPONSE"
          echo "$PUBLISH_RESPONSE" | jq -e '.status | map(. == "OK" or . == "ITEM_PENDING_REVIEW") | any' \
            || { echo "Publish failed"; exit 1; }
