name: Publish to Chrome Web Store

on:
  workflow_run:
    workflows: ["Build Release"]
    types: [completed]

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download extension zip from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName --jq '.[0].tagName')
          gh release download "$TAG" \
            --repo ${{ github.repository }} \
            --pattern 'furaffinity-features-extension.zip' \
            --dir dist/

      - name: Verify zip exists
        run: |
          if [ -f dist/furaffinity-features-extension.zip ]; then
            echo "✓ dist/furaffinity-features-extension.zip exists ($(du -h dist/furaffinity-features-extension.zip | cut -f1))"
          else
            echo "✗ dist/furaffinity-features-extension.zip NOT FOUND" && exit 1
          fi

