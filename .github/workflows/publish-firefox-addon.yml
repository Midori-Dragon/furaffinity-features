name: Publish to Firefox Add-on Store

on:
  workflow_run:
    workflows: ["Build Release"]
    types: [completed]

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RELEASE_NOTES: 'new release'
    steps:
      - name: Download extension zip and source archive from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName --jq '.[0].tagName')
          echo "TAG=$TAG" >> $GITHUB_ENV
          gh release download "$TAG" \
            --repo ${{ github.repository }} \
            --pattern 'furaffinity-features-extension.zip' \
            --dir dist/
          curl -fsSL "https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.zip" \
            -o dist/furaffinity-features-source.zip
          echo "RELEASE_NOTES=Updated to $TAG" >> $GITHUB_ENV

      - name: Verify zips exist
        run: |
          for f in dist/furaffinity-features-extension.zip dist/furaffinity-features-source.zip; do
            if [ -f "$f" ]; then
              echo "✓ $f exists ($(du -h $f | cut -f1))"
            else
              echo "✗ $f NOT FOUND" && exit 1
            fi
          done

      - name: Lint extension with web-ext
        run: |
          unzip -q dist/furaffinity-features-extension.zip -d dist/extension-unpacked
          npx web-ext lint --source-dir=dist/extension-unpacked

      - name: Upload to Firefox Add-on Store
        uses: browser-actions/release-firefox-addon@latest
        with:
          addon-id: ${{ secrets.FIREFOX_EXTENSION_UUID }}
          addon-path: 'dist/furaffinity-features-extension.zip'
          source-path: 'dist/furaffinity-features-source.zip'
          release-note: ${{ env.RELEASE_NOTES }}
          approval-note: |
            The source project requires Node.js 20.x and npm.
            To build the extension, run:
              npm ci
              npm run build:Browser-Extension-Deps-Rebuild
              npm run package:Browser-Extension
          auth-api-issuer: ${{ secrets.FIREFOX_AUTH_API_ISSUER }}
          auth-api-secret: ${{ secrets.FIREFOX_AUTH_API_SECRET }}
