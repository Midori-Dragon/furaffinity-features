name: Publish to Firefox Add-on Store

on:
  workflow_run:
    workflows: ["Build Release"]
    types: [completed]

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download extension zip and source archive from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api /repos/${{ github.repository }}/releases/latest --jq '.tag_name')
          gh release download "$TAG" \
            --repo ${{ github.repository }} \
            --pattern 'furaffinity-features-extension.zip' \
            --dir dist/
          curl -fsSL "https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.zip" \
            -o dist/furaffinity-features-source.zip

      - name: Upload to Firefox Add-on Store
        uses: browser-actions/release-firefox-addon@latest
        with:
          addon-id: ${{ secrets.FIREFOX_EXTENSION_UUID }}
          addon-path: 'dist/furaffinity-features-extension.zip'
          source-path: 'dist/furaffinity-features-source.zip'
          approval-note: |
            The source project requires Node.js 20.x and npm.
            To build the extension, run:
              npm ci
              npm run build:Browser-Extension-Deps-Rebuild
              npm run package:Browser-Extension
          auth-api-issuer: ${{ secrets.FIREFOX_AUTH_API_ISSUER }}
          auth-api-secret: ${{ secrets.FIREFOX_AUTH_API_SECRET }}
